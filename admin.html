<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Mercier | Gestión de Catálogo</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .admin-container { max-width: 1000px; margin: 8rem auto 4rem; padding: 3rem; background: var(--surface-color); border-radius: 8px; border: 1px solid rgba(255,255,255,0.05); }
        .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 3rem; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 2rem; }
        .login-box { max-width: 450px; margin: 12rem auto; padding: 4rem; background: var(--surface-color); border-radius: 8px; text-align: center; border: 1px solid rgba(255,255,255,0.05); }
        .form-group { margin-bottom: 1.5rem; text-align: left; }
        .form-group label { display: block; margin-bottom: 0.8rem; color: var(--text-secondary); font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1.5px; }
        .form-control { width: 100%; padding: 1rem; background: var(--bg-color); border: 1px solid rgba(255,255,255,0.1); color: var(--text-primary); border-radius: 4px; font-family: 'Outfit'; font-size: 1rem; }
        .form-control:focus { outline: none; border-color: rgba(255,255,255,0.3); }
        .admin-grid { display: grid; gap: 1rem; }
        .admin-item { display: flex; justify-content: space-between; align-items: center; padding: 1.5rem; background: var(--bg-color); border-radius: 8px; border: 1px solid rgba(255,255,255,0.02); }
        .admin-item-info strong { font-size: 1.1rem; font-weight: 400; display: block; margin-bottom: 5px; }
        .admin-item-info span { color: var(--text-secondary); font-size: 0.9rem; margin-right: 15px; }
        .btn-danger { background: rgba(255, 68, 68, 0.1); color: #ff4444; border: 1px solid rgba(255, 68, 68, 0.2); padding: 0.8rem 1.5rem; cursor: pointer; border-radius: 4px; transition: var(--transition); text-transform: uppercase; font-size: 0.8rem; letter-spacing: 1px; }
        .btn-danger:hover { background: #ff4444; color: white; }
        .add-form { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-bottom: 3rem; padding: 2.5rem; background: rgba(5,5,5,0.5); border-radius: 8px; border: 1px dashed rgba(255,255,255,0.1); }
        .add-form .full-width { grid-column: 1 / -1; }
    </style>
</head>
<body>
    <nav class="navbar" style="background: rgba(5,5,5,0.95); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.05);">
        <div class="logo">Mercier. <span style="color:#d4af37; font-size: 1rem; font-weight: 300;">| Panel Admin</span></div>
        <ul class="nav-links">
            <li><a href="index.html">← Volver a la Tienda</a></li>
        </ul>
    </nav>

    <!-- Login Area -->
    <div id="loginView" class="login-box">
        <h2 style="margin-bottom: 2.5rem; font-weight: 300; letter-spacing: 2px;">Acceso Restringido</h2>
        <div class="form-group">
            <label>Contraseña Maestra</label>
            <input type="password" id="adminPassword" class="form-control" placeholder="Ingresa tu clave secreta">
        </div>
        <button class="btn-primary" style="width: 100%; margin-top: 1rem;" onclick="attemptLogin()">Ingresar</button>
        <p style="color:#ff4444; margin-top: 1.5rem; display: none; font-size:0.9rem;" id="loginError">Contraseña incorrecta.</p>
    </div>

    <!-- Admin Dashboard -->
    <main class="admin-container" id="adminView" style="display: none;">
        <div class="admin-header">
            <h2 style="font-weight: 300; letter-spacing: 2px;">Gestión de Catálogo</h2>
            <button class="btn-primary" onclick="toggleAddForm()">+ Nuevo Producto</button>
        </div>

        <div id="addFormContainer" style="display: none;">
            <div class="add-form">
                <div class="form-group full-width">
                    <h3 style="font-weight:300; margin-bottom:0.5rem; color:var(--text-secondary);">Cargar nueva prenda al catálogo</h3>
                </div>
                <div class="form-group">
                    <label>Nombre de la Prenda</label>
                    <input type="text" id="newName" class="form-control" placeholder="Ej: Boca Juniors Suplente">
                </div>
                <div class="form-group">
                    <label>Precio (AR$)</label>
                    <input type="number" id="newPrice" class="form-control" placeholder="Ej: 85000">
                </div>
                <div class="form-group">
                    <label>Temporada / Año</label>
                    <input type="text" id="newSeason" class="form-control" placeholder="Ej: Temporada 1998">
                </div>
                <div class="form-group">
                    <label>Categorías</label>
                    <div id="newCategory" style="display: flex; gap: 1rem; flex-wrap: wrap; margin-top: 0.5rem;">
                        <label style="text-transform:none; font-size: 0.95rem; cursor:pointer;"><input type="checkbox" value="retro" class="category-checkbox" style="margin-right:5px;">Colección Retro</label>
                        <label style="text-transform:none; font-size: 0.95rem; cursor:pointer;"><input type="checkbox" value="selecciones" class="category-checkbox" style="margin-right:5px;">Selecciones</label>
                        <label style="text-transform:none; font-size: 0.95rem; cursor:pointer;"><input type="checkbox" value="novedades" class="category-checkbox" style="margin-right:5px;">Novedades</label>
                    </div>
                </div>
                <div class="form-group full-width">
                    <label>Stock por Talle (Unidades)</label>
                    <div style="display:flex; gap:10px; flex-wrap:wrap;">
                        <label style="color:var(--text-secondary); font-size:0.9rem;">S: <input type="number" id="stockS" class="form-control" value="0" min="0" style="width:60px; padding:0.5rem;"></label>
                        <label style="color:var(--text-secondary); font-size:0.9rem;">M: <input type="number" id="stockM" class="form-control" value="0" min="0" style="width:60px; padding:0.5rem;"></label>
                        <label style="color:var(--text-secondary); font-size:0.9rem;">L: <input type="number" id="stockL" class="form-control" value="0" min="0" style="width:60px; padding:0.5rem;"></label>
                        <label style="color:var(--text-secondary); font-size:0.9rem;">XL: <input type="number" id="stockXL" class="form-control" value="0" min="0" style="width:60px; padding:0.5rem;"></label>
                        <label style="color:var(--text-secondary); font-size:0.9rem;">XXL: <input type="number" id="stockXXL" class="form-control" value="0" min="0" style="width:60px; padding:0.5rem;"></label>
                    </div>
                </div>
                <div class="form-group full-width">
                    <label>Imágenes del Producto (Archivos Locales - Alta Calidad)</label>
                    <input type="file" id="newImage" accept="image/*" class="form-control" multiple onchange="handleImageUpload(event)">
                    <div id="imagePreviewContainer" style="display:flex; gap:10px; flex-wrap:wrap; margin-top:10px;"></div>
                </div>
                <div class="form-group full-width">
                    <label>Link Público de la Imagen (Para previsualización en WhatsApp)</label>
                    <input type="url" id="publicImageUrl" class="form-control" placeholder="Ej: https://i.imgur.com/camiseta.jpg">
                </div>
                <div class="form-group full-width">
                    <button id="saveBtn" class="btn-primary" style="width:100%;" onclick="saveProductAction()">Guardar Producto Público</button>
                    <button id="cancelBtn" class="btn-danger" style="width:100%; display:none; margin-top:10px;" onclick="cancelEdit()">Cancelar Edición</button>
                </div>
            </div>
        </div>

        <div class="admin-grid" id="adminProductList">
            <!-- Rendered by JS -->
        </div>
    </main>

    <script src="js/admin.js"></script>
</body>
</html>
